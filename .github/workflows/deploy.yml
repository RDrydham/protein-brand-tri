name: 🚀 TRI Auto Deploy

on:
  push:
    branches: [main]

jobs:
  # ── Job 1: Run Tests ──────────────────────────────────────────────────────
  test:
    name: ✅ Run Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tridb_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install Dependencies
        run: npm install
        working-directory: backend

      - name: Initialize Test Database
        run: psql -h localhost -U postgres -d tridb_test -f backend/db/schema.sql
        env:
          PGPASSWORD: postgres


  # ── Job 2: Deploy (only if tests pass) ───────────────────────────────────
  deploy:
    name: Deploy to GCP
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Check deploy SSH secrets
        id: deploy_secrets
        env:
          SERVER_IP: ${{ secrets.SERVER_IP }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SSH_KEY: ${{ secrets.SSH_KEY }}
        run: |
          if [ -n "$SERVER_IP" ] && [ -n "$SERVER_USER" ] && [ -n "$SSH_KEY" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::Skipping deploy: missing one or more required secrets (SERVER_IP, SERVER_USER, SSH_KEY)."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Copy Files to Server
        if: steps.deploy_secrets.outputs.ready == 'true'
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: "."
          target: "/home/ubuntu/tri-project"

      - name: Deploy
        if: steps.deploy_secrets.outputs.ready == 'true'
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /home/ubuntu/tri-project

            # Create .env file
            cat > .env << EOF
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            RAZORPAY_KEY_ID=${{ secrets.RAZORPAY_KEY_ID }}
            RAZORPAY_KEY_SECRET=${{ secrets.RAZORPAY_KEY_SECRET }}
            EMAIL=${{ secrets.EMAIL }}
            EMAIL_PASSWORD=${{ secrets.EMAIL_PASSWORD }}
            GRAFANA_PASSWORD=${{ secrets.GRAFANA_PASSWORD }}
            EOF

            # Deploy
            docker compose down
            docker compose up -d --build

            # Health check
            sleep 15
            docker compose exec -T backend node -e "require('http').get('http://localhost:3000/health',(r)=>console.log(r.statusCode))"

            # Cleanup
            docker image prune -f

            echo "✅ TRI Deploy successful!"

      - name: Deployment skipped
        if: steps.deploy_secrets.outputs.ready != 'true'
        run: echo "ℹ️ Deployment skipped because required SSH secrets are not configured."
