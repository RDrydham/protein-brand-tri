name: 🚀 TRI Auto Deploy

on:
  push:
    branches: [main]

jobs:
  # ── Job 1: Run Tests ──────────────────────────────────────────────────────
  test:
    name: ✅ Run Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tridb_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install Dependencies
        run: npm install
        working-directory: backend

      - name: Wait for PostgreSQL to be ready
        run: |
          echo "Waiting for PostgreSQL to accept connections..."
          for i in $(seq 1 30); do
            if pg_isready -h localhost -p 5432 -U postgres; then
              echo "✅ PostgreSQL is ready!"
              exit 0
            fi
            echo "Attempt $i/30 — not ready yet, sleeping 1s..."
            sleep 1
          done
          echo "❌ PostgreSQL did not become ready in time."
          exit 1

      - name: Initialize Test Database
        run: |
          node -e "
            const { Pool } = require('pg');
            const fs = require('fs');
            const path = require('path');

            const pool = new Pool({
              host: 'localhost',
              user: 'postgres',
              password: 'postgres',
              database: 'tridb_test',
              port: 5432,
            });

            const schemaPath = path.join(process.env.GITHUB_WORKSPACE, 'backend', 'db', 'schema.sql');
            const sql = fs.readFileSync(schemaPath, 'utf8');

            pool.query(sql)
              .then(() => {
                console.log('✅ Test database schema initialized successfully.');
                return pool.end();
              })
              .then(() => process.exit(0))
              .catch((err) => {
                console.error('❌ Schema initialization failed:', err.message);
                pool.end().finally(() => process.exit(1));
              });
          "
        working-directory: backend

      - name: Run Tests
        run: npm test
        working-directory: backend
        env:
          DB_HOST: localhost
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_NAME: tridb_test
          JWT_SECRET: test-secret
          REDIS_URL: ''


  # ── Job 2: Deploy (only if tests pass) ───────────────────────────────────
  deploy:
    name: Deploy to GCP
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Copy Files to Server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: "."
          target: "/home/ubuntu/tri-project"

      - name: Deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /home/ubuntu/tri-project

            # Create .env file
            cat > .env << EOF
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            RAZORPAY_KEY_ID=${{ secrets.RAZORPAY_KEY_ID }}
            RAZORPAY_KEY_SECRET=${{ secrets.RAZORPAY_KEY_SECRET }}
            EMAIL=${{ secrets.EMAIL }}
            EMAIL_PASSWORD=${{ secrets.EMAIL_PASSWORD }}
            GRAFANA_PASSWORD=${{ secrets.GRAFANA_PASSWORD }}
            EOF

            # Deploy
            docker compose down
            docker compose up -d --build

            # Health check
            sleep 15
            docker compose exec -T backend node -e "require('http').get('http://localhost:3000/health',(r)=>console.log(r.statusCode))"

            # Cleanup
            docker image prune -f

            echo "✅ TRI Deploy successful!"
