<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Your TRI account dashboard — track orders, view history, manage your profile.">
  <title>My Account — TRI The Real Inside</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=DM+Sans:wght@300;400;500;600;700&family=Montserrat:wght@500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; scroll-behavior: smooth; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: #0b0b0c;
      color: #f5f5f7;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    a { text-decoration: none; color: inherit; }
    button { cursor: pointer; border: none; background: none; font-family: inherit; }

    :root {
      --rose: #E6A2A4;
      --rose-dark: #C8787A;
      --dark: #0b0b0c;
      --panel: #121214;
      --panel-2: #1c1c1e;
      --border: #2c2c2e;
      --text: #f5f5f7;
      --muted: #a1a1a6;
      --gold: #C8A96E;
      --green: #22c55e;
      --blue: #3b82f6;
      --orange: #f59e0b;
      --font-serif: 'Playfair Display', Georgia, serif;
      --font-sans: 'DM Sans', sans-serif;
      --font-label: 'Montserrat', sans-serif;
      --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* ── NAV ── */
    .acct-nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(11,11,12,0.92);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      height: 64px;
      display: flex; align-items: center;
      padding: 0 40px;
    }
    .acct-nav-inner {
      width: 100%; max-width: 1100px; margin: 0 auto;
      display: flex; align-items: center;
      justify-content: space-between;
    }
    .nav-logo-mark {
      font-family: var(--font-serif);
      font-size: 22px; font-weight: 800;
      color: var(--gold); letter-spacing: 0.05em;
    }
    .nav-logo-sub {
      font-family: var(--font-label);
      font-size: 7px; font-weight: 700;
      letter-spacing: 0.25em; text-transform: uppercase;
      color: var(--muted); display: block; margin-top: 1px;
    }
    .nav-actions { display: flex; align-items: center; gap: 12px; }
    .btn-shop {
      padding: 9px 20px;
      background: var(--gold);
      color: #fff;
      border-radius: 999px;
      font-family: var(--font-label);
      font-size: 11px; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
      transition: background 0.2s, transform 0.15s;
    }
    .btn-shop:hover { background: #a88848; transform: translateY(-1px); }
    .btn-signout {
      padding: 9px 18px;
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 999px;
      font-family: var(--font-label);
      font-size: 11px; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase;
      transition: all 0.2s;
    }
    .btn-signout:hover { border-color: var(--rose); color: var(--rose); }

    /* ── PAGE BODY ── */
    .acct-body {
      max-width: 1100px; margin: 0 auto;
      padding: 40px 40px 80px;
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 28px;
      align-items: start;
    }

    /* ── SIDEBAR ── */
    .acct-sidebar { position: sticky; top: 80px; }

    .profile-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px 24px;
      text-align: center;
      margin-bottom: 16px;
    }
    .profile-avatar {
      width: 72px; height: 72px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--rose-dark), var(--rose));
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-label);
      font-size: 24px; font-weight: 800;
      color: #fff; margin: 0 auto 16px;
      letter-spacing: 0.05em;
    }
    .profile-name {
      font-family: var(--font-serif);
      font-size: 20px; font-weight: 700;
      color: var(--text); margin-bottom: 4px;
    }
    .profile-email {
      font-size: 13px; color: var(--muted);
    }
    .profile-role {
      display: inline-block;
      margin-top: 10px;
      padding: 4px 12px;
      background: rgba(200,120,122,0.12);
      border: 1px solid rgba(200,120,122,0.25);
      border-radius: 999px;
      font-family: var(--font-label);
      font-size: 9px; font-weight: 700;
      letter-spacing: 0.15em; text-transform: uppercase;
      color: var(--rose);
    }
    .profile-meta {
      margin-top: 16px; padding-top: 16px;
      border-top: 1px solid var(--border);
      text-align: left;
    }
    .meta-item {
      display: flex; justify-content: space-between;
      font-size: 12px; color: var(--muted);
      margin-bottom: 8px;
    }
    .meta-item strong { color: var(--text); font-weight: 500; }

    .sidebar-links {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
    }
    .sidebar-link {
      display: flex; align-items: center; gap: 10px;
      padding: 14px 20px;
      font-size: 14px; color: var(--muted);
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .sidebar-link:last-child { border-bottom: none; }
    .sidebar-link:hover { background: var(--panel-2); color: var(--text); }
    .sidebar-link.active { color: var(--rose); background: rgba(200,120,122,0.06); }
    .sidebar-link-icon { font-size: 16px; width: 24px; }

    /* ── MAIN CONTENT ── */
    .acct-main {}

    /* Tab panels */
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* Section header */
    .section-header {
      display: flex; align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .section-title {
      font-family: var(--font-serif);
      font-size: 24px; font-weight: 700;
      color: var(--text);
    }
    .section-subtitle {
      font-size: 13px; color: var(--muted);
      margin-top: 4px;
    }

    /* ── ORDERS ── */
    .orders-list { display: flex; flex-direction: column; gap: 16px; }

    .order-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .order-card:hover {
      border-color: rgba(200,120,122,0.3);
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }
    .order-header {
      display: flex; align-items: flex-start;
      justify-content: space-between;
      padding: 20px 24px;
      flex-wrap: wrap; gap: 12px;
    }
    .order-num {
      font-family: var(--font-label);
      font-size: 13px; font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--text);
      margin-bottom: 4px;
    }
    .order-date {
      font-size: 12px; color: var(--muted);
    }
    .order-right {
      display: flex; align-items: center; gap: 12px; flex-shrink: 0;
    }
    .status-badge {
      padding: 5px 12px;
      border-radius: 999px;
      font-family: var(--font-label);
      font-size: 10px; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
    }
    .status-pending   { background: rgba(245,158,11,0.12);  color: #f59e0b;  border: 1px solid rgba(245,158,11,0.25); }
    .status-confirmed { background: rgba(59,130,246,0.12);  color: #60a5fa;  border: 1px solid rgba(59,130,246,0.25); }
    .status-shipped   { background: rgba(200,169,110,0.12); color: var(--gold); border: 1px solid rgba(200,169,110,0.25); }
    .status-delivered { background: rgba(34,197,94,0.12);   color: var(--green); border: 1px solid rgba(34,197,94,0.25); }
    .status-cancelled { background: rgba(239,68,68,0.1);    color: #f87171; border: 1px solid rgba(239,68,68,0.2); }
    .status-paid      { background: rgba(34,197,94,0.12);   color: var(--green); border: 1px solid rgba(34,197,94,0.25); }

    .order-total {
      font-family: var(--font-label);
      font-size: 16px; font-weight: 800;
      color: var(--rose);
    }

    .order-items-strip {
      padding: 0 24px 16px;
      display: flex; flex-wrap: wrap; gap: 8px;
    }
    .order-item-chip {
      display: flex; align-items: center; gap: 8px;
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 8px; padding: 8px 12px;
      font-size: 12px; color: var(--muted);
    }
    .order-item-chip img {
      width: 28px; height: 28px;
      object-fit: contain; border-radius: 4px;
    }
    .order-item-chip-name { color: var(--text); font-weight: 500; }
    .order-item-chip-qty { color: var(--muted); }

    .order-footer {
      padding: 12px 24px;
      border-top: 1px solid var(--border);
      display: flex; align-items: center;
      justify-content: space-between;
      background: rgba(255,255,255,0.01);
    }
    .order-address {
      font-size: 12px; color: var(--muted);
      max-width: 60%;
    }
    .order-address strong { color: var(--text); font-weight: 500; }
    .btn-reorder {
      padding: 8px 16px;
      background: rgba(200,120,122,0.1);
      color: var(--rose);
      border: 1px solid rgba(200,120,122,0.25);
      border-radius: 8px;
      font-family: var(--font-label);
      font-size: 10px; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase;
      transition: all 0.2s;
    }
    .btn-reorder:hover {
      background: rgba(200,120,122,0.2);
      border-color: var(--rose-dark);
    }

    /* Empty state */
    .empty-state {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 60px 40px;
      text-align: center;
    }
    .empty-icon { font-size: 48px; margin-bottom: 16px; }
    .empty-title {
      font-family: var(--font-serif);
      font-size: 22px; font-weight: 700;
      color: var(--text); margin-bottom: 8px;
    }
    .empty-desc { font-size: 14px; color: var(--muted); margin-bottom: 24px; }
    .btn-shop-now {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 12px 28px;
      background: var(--rose-dark); color: #fff;
      border-radius: 999px;
      font-family: var(--font-label);
      font-size: 12px; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase;
      transition: background 0.2s, transform 0.15s;
    }
    .btn-shop-now:hover { background: #b86668; transform: translateY(-2px); }

    /* Loading skeleton */
    .skeleton {
      background: linear-gradient(90deg, var(--panel-2) 25%, rgba(44,44,46,0.5) 50%, var(--panel-2) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 8px;
    }
    @keyframes shimmer { to { background-position: -200% 0; } }
    .skeleton-card {
      height: 140px; border-radius: 14px; margin-bottom: 16px;
    }

    /* Toast */
    #acct-toast {
      position: fixed; bottom: 32px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--panel); border: 1px solid var(--border);
      color: var(--text); padding: 14px 24px;
      border-radius: 12px; font-size: 14px;
      z-index: 9999; opacity: 0;
      transition: all 0.35s var(--ease-out);
      white-space: nowrap;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
      pointer-events: none;
    }
    #acct-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      .acct-body {
        grid-template-columns: 1fr;
        padding: 20px 16px 60px;
        gap: 16px;
      }
      .acct-sidebar { position: static; }
      .acct-nav { padding: 0 16px; }
      .order-header { flex-direction: column; }
      .order-right { justify-content: flex-start; }
      .order-footer { flex-direction: column; align-items: flex-start; gap: 10px; }
    }
  </style>
</head>
<body>

<!-- ═══ NAV ═══ -->
<nav class="acct-nav">
  <div class="acct-nav-inner">
    <a href="index.html" style="text-decoration:none;">
      <div class="nav-logo-mark">△ TRI</div>
      <div class="nav-logo-sub">The Real Inside</div>
    </a>
    <div class="nav-actions">
      <a href="shop.html" class="btn-shop">Shop Now</a>
      <button class="btn-signout" id="signout-btn">Sign Out</button>
    </div>
  </div>
</nav>

<div id="acct-toast"></div>

<!-- ═══ PAGE BODY ═══ -->
<div class="acct-body" id="acct-body" style="display:none">

  <!-- ═══ SIDEBAR ═══ -->
  <div class="acct-sidebar">
    <div class="profile-card">
      <div class="profile-avatar" id="profile-avatar">??</div>
      <div class="profile-name" id="profile-name">Loading...</div>
      <div class="profile-email" id="profile-email"></div>
      <div class="profile-role" id="profile-role">Member</div>
      <div class="profile-meta" id="profile-meta"></div>
    </div>

    <div class="sidebar-links">
      <div class="sidebar-link active" data-tab="orders">
        <span class="sidebar-link-icon">📦</span>
        Order History
      </div>
      <a href="shop.html" class="sidebar-link">
        <span class="sidebar-link-icon">🛍️</span>
        Continue Shopping
      </a>
      <a href="index.html" class="sidebar-link">
        <span class="sidebar-link-icon">🏠</span>
        Home
      </a>
    </div>
  </div>

  <!-- ═══ MAIN CONTENT ═══ -->
  <div class="acct-main">

    <!-- ORDERS TAB -->
    <div class="tab-panel active" id="tab-orders">
      <div class="section-header">
        <div>
          <div class="section-title">Order History</div>
          <div class="section-subtitle">All your past and current orders</div>
        </div>
      </div>

      <!-- Loading skeletons -->
      <div id="orders-skeleton">
        <div class="skeleton skeleton-card"></div>
        <div class="skeleton skeleton-card"></div>
      </div>

      <!-- Orders list -->
      <div class="orders-list" id="orders-list" style="display:none"></div>

      <!-- Empty state -->
      <div class="empty-state" id="orders-empty" style="display:none">
        <div class="empty-icon">📦</div>
        <div class="empty-title">No orders yet</div>
        <div class="empty-desc">You haven't placed any orders. Start fueling with science today.</div>
        <a href="shop.html" class="btn-shop-now">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
          Shop Now
        </a>
      </div>
    </div>

  </div>
</div>

<!-- Loading screen -->
<div id="loading-screen" style="display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:16px;">
  <div style="font-family:'Playfair Display',serif;font-size:28px;font-weight:800;color:#C8A96E;letter-spacing:0.05em;">△ TRI</div>
  <div style="width:40px;height:40px;border:2px solid rgba(200,120,122,0.3);border-top-color:#C8787A;border-radius:50%;animation:spin 0.7s linear infinite;"></div>
</div>
<style>@keyframes spin { to { transform: rotate(360deg); } }</style>

<script src="assets/tri-auth.js"></script>
<script>
(function () {
  'use strict';

  /* ── Auth Guard ── */
  const token = localStorage.getItem('tri_token');
  const storedUser = (() => {
    try { return JSON.parse(localStorage.getItem('tri_user') || 'null'); } catch { return null; }
  })();

  if (!token || !storedUser) {
    window.location.href = 'login.html?redirect=account.html';
    return;
  }

  /* ── Helpers ── */
  const $ = id => document.getElementById(id);
  let toastTimer;
  function showToast(msg) {
    const t = $('acct-toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 3500);
  }

  function formatDate(str) {
    if (!str) return '';
    const d = new Date(str);
    return d.toLocaleDateString('en-IN', { day: 'numeric', month: 'long', year: 'numeric' });
  }

  function getStatusClass(status) {
    const map = {
      pending:   'status-pending',
      confirmed: 'status-confirmed',
      shipped:   'status-shipped',
      delivered: 'status-delivered',
      cancelled: 'status-cancelled',
      paid:      'status-paid'
    };
    return map[(status || '').toLowerCase()] || 'status-pending';
  }

  /* ── Populate profile sidebar ── */
  function populateProfile(user) {
    const initials = user.name
      ? user.name.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2)
      : '??';
    $('profile-avatar').textContent = initials;
    $('profile-name').textContent   = user.name || 'TRI Member';
    $('profile-email').textContent  = user.email || '';
    $('profile-role').textContent   = user.role ? user.role.charAt(0).toUpperCase() + user.role.slice(1) : 'Member';
  }

  /* ── Render orders ── */
  function renderOrders(orders) {
    $('orders-skeleton').style.display = 'none';

    if (!orders || orders.length === 0) {
      $('orders-empty').style.display = 'block';
      $('orders-list').style.display  = 'none';
      return;
    }

    $('orders-empty').style.display = 'none';
    $('orders-list').style.display  = 'flex';

    $('orders-list').innerHTML = orders.map(order => {
      const items = (order.items || []).filter(i => i && i.name);
      const statusClass = getStatusClass(order.status);
      const addressObj = (() => {
        try { return typeof order.address === 'string' ? JSON.parse(order.address) : order.address; }
        catch { return null; }
      })();
      const addressText = addressObj
        ? `${addressObj.name || ''}, ${addressObj.city || ''} ${addressObj.pincode || ''}`
        : '';

      return `
        <div class="order-card">
          <div class="order-header">
            <div>
              <div class="order-num">${order.order_number || 'TRI-ORDER'}</div>
              <div class="order-date">${formatDate(order.created_at)}</div>
            </div>
            <div class="order-right">
              <span class="status-badge ${statusClass}">${(order.status || 'pending').toUpperCase()}</span>
              <span class="order-total">₹${parseFloat(order.total || 0).toLocaleString('en-IN')}</span>
            </div>
          </div>

          ${items.length > 0 ? `
          <div class="order-items-strip">
            ${items.map(item => `
              <div class="order-item-chip">
                ${item.image ? `<img src="${item.image}" alt="${item.name}" onerror="this.style.display='none'">` : ''}
                <div>
                  <div class="order-item-chip-name">${item.name}</div>
                  <div class="order-item-chip-qty">×${item.quantity || 1} — ₹${parseFloat(item.price || 0).toLocaleString('en-IN')}</div>
                </div>
              </div>
            `).join('')}
          </div>` : ''}

          <div class="order-footer">
            <div class="order-address">
              ${addressText ? `<strong>Ship to:</strong> ${addressText}` : ''}
            </div>
            <button class="btn-reorder" onclick="reorder(${JSON.stringify(JSON.stringify(items)).replace(/'/g, "\\'")})">
              ↺ Reorder
            </button>
          </div>
        </div>
      `;
    }).join('');
  }

  /* ── Reorder functionality ── */
  window.reorder = function (itemsJson) {
    try {
      const items = JSON.parse(itemsJson);
      const PRODUCT_ID_MAP = {
        'TRI Fusion Pack': 1, 'TRI True Whey Protein': 2,
        'TRI Power BCAA': 3, 'TRI Pump Drake Pre-Workout': 4
      };
      // Add items to local cart as fallback
      let localCart = [];
      try { localCart = JSON.parse(localStorage.getItem('tri_cart') || '[]'); } catch (e) {}
      items.forEach(item => {
        if (!item.name) return;
        const existing = localCart.find(c => c.name === item.name);
        if (existing) existing.qty += (item.quantity || 1);
        else localCart.push({
          name: item.name,
          price: parseFloat(item.price) || 0,
          image: item.image || 'assets/hero_product.png',
          qty: item.quantity || 1
        });
      });
      localStorage.setItem('tri_cart', JSON.stringify(localCart));
      showToast('Items added to cart! 🛒');
      setTimeout(() => { window.location.href = 'shop.html'; }, 1200);
    } catch (e) {
      showToast('Could not reorder. Please add items manually.');
    }
  };

  /* ── Load data ── */
  async function loadAccountData() {
    try {
      // Get profile from API
      const profileRes = await fetch('/api/auth/profile', {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      const profile = profileRes.ok ? await profileRes.json() : storedUser;

      populateProfile(profile || storedUser);

      // Get orders
      const ordersRes = await fetch('/api/orders/history', {
        headers: { 'Authorization': `Bearer ${token}` }
      });

      if (ordersRes.ok) {
        const orders = await ordersRes.json();
        renderOrders(orders);
      } else if (ordersRes.status === 401) {
        // Token expired
        localStorage.removeItem('tri_token');
        localStorage.removeItem('tri_user');
        window.location.href = 'login.html';
        return;
      } else {
        renderOrders([]);
      }

      // Show account body
      $('loading-screen').style.display = 'none';
      $('acct-body').style.display = 'grid';

    } catch (err) {
      console.error('Account load error:', err);
      // Show with whatever we have
      populateProfile(storedUser);
      renderOrders([]);
      $('loading-screen').style.display = 'none';
      $('acct-body').style.display = 'grid';
    }
  }

  /* ── Sign Out ── */
  $('signout-btn').addEventListener('click', async function () {
    this.textContent = 'Signing out...';
    this.disabled = true;
    try {
      await fetch('/api/auth/logout', {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${token}` }
      });
    } catch (e) {}
    localStorage.removeItem('tri_token');
    localStorage.removeItem('tri_user');
    localStorage.removeItem('tri_cart');
    showToast('Signed out successfully 👋');
    setTimeout(() => { window.location.href = 'index.html'; }, 800);
  });

  /* ── Initialize ── */
  loadAccountData();

})();
</script>

</body>
</html>
