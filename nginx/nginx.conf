worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;
    limit_conn_zone $binary_remote_addr zone=conn:10m;

    # Upstream
    upstream backend {
        least_conn;
        server backend:3000;
        keepalive 32;
    }

    upstream frontend {
        server frontend:80;
    }

    # HTTP → HTTPS
    server {
        listen 80;
        server_name therealinside.com www.therealinside.com;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS
    server {
        listen 443 ssl http2;
        server_name therealinside.com www.therealinside.com;

        ssl_certificate /etc/letsencrypt/live/therealinside.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/therealinside.com/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-XSS-Protection "1; mode=block";
        add_header X-Content-Type-Options "nosniff";
        add_header Strict-Transport-Security "max-age=31536000";

        # Gzip
        gzip on;
        gzip_types text/plain application/json application/javascript text/css image/svg+xml;

        # API routes
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            limit_conn conn 20;

            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
        }

        # Auth rate limiting
        location /api/auth/ {
            limit_req zone=auth burst=5 nodelay;
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Frontend
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;

            # Cache static files
            location ~* \.(jpg|jpeg|png|gif|ico|css|js|webp|svg)$ {
                expires 30d;
                add_header Cache-Control "public, immutable";
                proxy_pass http://frontend;
            }
        }
    }
}
